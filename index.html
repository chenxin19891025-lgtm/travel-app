<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智绘旅途 - AI个性化旅游路线定制</title>
    
    <!-- 全面替换为国内极速 CDN (Staticfile) 保证大陆秒开 -->
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://cdn.staticfile.net/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.staticfile.net/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel -->
    <script src="https://cdn.staticfile.net/babel-standalone/7.23.10/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        /* 漫画风地图的背景纸张纹理 */
        .comic-bg {
            background-color: #fdfbf7;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="bg-[#f8fafc] font-sans text-slate-800">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚠️ 核心配置区 (DeepSeek 模型)
        // ==========================================
        // 1. 填入你的 DeepSeek API Key (申请地址: platform.deepseek.com)
        const apiKey = "sk-34e63c3fa9b34546bbf86e5eeb866f6c"; 
        
        // 2. API 地址
        // DeepSeek 官方 API 国内直连非常友好
        const apiBaseUrl = "https://api.deepseek.com";
        // ==========================================

        
        // 我们提取了一些核心图标的简易 SVG
        const PlaneIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-600"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.2-1.1.6L3 8l6 5-3 3-3-1-2 2 4 4 2-2-1-3 3-3 5 6 1.2-.7c.4-.2.7-.6.6-1.1Z"/></svg>;
        const MapPinIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5 text-blue-500"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const CalendarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5 text-blue-500"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const DollarIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5 text-blue-500"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
        const CompassIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-1.5 text-blue-500"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>;
        const LoaderIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const AlertIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="mr-2 flex-shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;

        const fetchWithRetry = async (url, options, retries = 5) => {
          const delays = [1000, 2000, 4000, 8000, 16000];
          for (let i = 0; i < retries; i++) {
            try {
              const res = await fetch(url, options);
              if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
              return await res.json();
            } catch (e) {
              if (i === retries - 1) throw e;
              await new Promise(r => setTimeout(r, delays[i]));
            }
          }
        };

        // --- 核心新组件：大富翁式拓扑寻宝路线图 (解决重叠问题) ---
        function ComicRouteMap({ itinerary }) {
          if (!itinerary || !itinerary.days) return null;

          // 提取所有有名称的地点作为关键节点
          const points = [];
          itinerary.days.forEach(day => {
            day.activities.forEach(act => {
              if (act.name) {
                points.push({ ...act, day: day.dayNumber });
              }
            });
          });

          if (points.length === 0) return null;

          // 使用大富翁式蛇形布局 (S-shape/Zig-zag)
          const pointsPerRow = 4; // 每行最多放4个景点
          const rowHeight = 140;  // 行间距加大，防重叠
          const startX = 80;
          const endX = 720;
          const startY = 80;
          const xStep = (endX - startX) / (pointsPerRow - 1);
          
          const numRows = Math.ceil(points.length / pointsPerRow);
          const svgWidth = 800;
          const svgHeight = startY + (numRows - 1) * rowHeight + 120; // 动态高度

          // 计算每个节点的拓扑固定坐标
          const mappedPoints = points.map((p, i) => {
            const row = Math.floor(i / pointsPerRow);
            const col = i % pointsPerRow;
            // 蛇形走位：偶数行从左到右，奇数行从右到左
            const actualCol = row % 2 === 0 ? col : (pointsPerRow - 1 - col);
            
            // 加上微小的视觉随机抖动，让手绘感更强，但不影响防重叠
            const jitterX = (Math.random() * 20 - 10);
            const jitterY = (Math.random() * 20 - 10);

            const x = startX + actualCol * xStep + jitterX;
            const y = startY + row * rowHeight + jitterY;
            return { ...p, x, y };
          });

          // 绘制圆滑连线
          let pathD = "";
          if (mappedPoints.length > 0) {
              pathD = `M ${mappedPoints[0].x},${mappedPoints[0].y} `;
              for (let i = 1; i < mappedPoints.length; i++) {
                  const prev = mappedPoints[i - 1];
                  const curr = mappedPoints[i];
                  // 使用二次贝塞尔曲线平滑拐角
                  const midX = (prev.x + curr.x) / 2;
                  const midY = (prev.y + curr.y) / 2;
                  pathD += `Q ${prev.x},${midY} ${midX},${midY} T ${curr.x},${curr.y} `;
              }
          }

          return (
            <div className="mb-8 comic-bg rounded-[2rem] border-4 border-slate-800 shadow-[8px_8px_0px_rgba(30,41,59,1)] p-6 relative overflow-hidden">
              <div className="absolute top-4 left-6 flex items-center space-x-2">
                 <span className="text-2xl">🗺️</span>
                 <h3 className="text-xl font-black text-slate-800 tracking-widest">专属寻宝路线图</h3>
              </div>
              
              <div className="w-full overflow-x-auto mt-8 pt-4 pb-4">
                <div className="min-w-[600px] relative">
                  <svg viewBox={`0 0 ${svgWidth} ${svgHeight}`} className="w-full h-auto drop-shadow-md">
                    
                    {/* 寻宝虚线 */}
                    <path d={pathD} fill="none" stroke="#ef4444" strokeWidth="6" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="12, 16" className="opacity-80" />
                    
                    {/* 绘制地标节点 */}
                    {mappedPoints.map((p, i) => {
                      let color = '#3b82f6'; 
                      let emoji = '📍';
                      if(p.type === 'food') { color = '#f97316'; emoji = '🍔'; }
                      else if(p.type === 'hotel') { color = '#8b5cf6'; emoji = '🏨'; }
                      else if(p.type === 'attraction') { color = '#10b981'; emoji = '📸'; }
                      else if(p.type === 'shopping') { color = '#ec4899'; emoji = '🛍️'; }
                      else if(p.type === 'transport') { color = '#64748b'; emoji = '🚗'; }

                      // 统一把文字放到底部，因为行距已经拉开，彻底解决重叠
                      const textYOffset = 45;

                      return (
                        <g key={i} transform={`translate(${p.x}, ${p.y})`}>
                          {/* 节点气泡阴影和背景 */}
                          <circle cx="0" cy="0" r="22" fill="white" stroke="#1e293b" strokeWidth="3" className="drop-shadow-sm transition-transform hover:scale-110 cursor-pointer" />
                          {/* Emoji */}
                          <text x="0" y="8" fontSize="22" textAnchor="middle">{emoji}</text>
                          {/* D天数标签 */}
                          <g transform="translate(14, -14)">
                            <circle cx="0" cy="0" r="10" fill={color} stroke="white" strokeWidth="2" />
                            <text x="0" y="4" fontSize="10" fill="white" fontWeight="bold" textAnchor="middle">D{p.day}</text>
                          </g>
                          {/* 地点名称 (最多显示6个字防溢出) */}
                          <text x="0" y={textYOffset} fontSize="14" fontWeight="900" fill="#1e293b" textAnchor="middle" style={{ paintOrder: 'stroke', stroke: 'white', strokeWidth: '5px', strokeLinecap: 'round', strokeLinejoin: 'round' }}>
                            {p.name.substring(0, 6)}{p.name.length > 6 ? '...' : ''}
                          </text>
                        </g>
                      );
                    })}
                  </svg>
                </div>
              </div>
            </div>
          );
        }

        function App() {
          const [formData, setFormData] = useState({
            destination: '',
            days: '',
            budget: '',
            preferences: []
          });
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState('');
          const [itineraryData, setItineraryData] = useState(null);

          const preferenceOptions = ['自然风光', '人文历史', '特色美食', '休闲度假', '网红打卡', '特种兵', '亲子游', '买买买'];

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData(prev => ({ ...prev, [name]: value }));
          };

          const togglePreference = (pref) => {
            setFormData(prev => {
              const prefs = prev.preferences;
              if (prefs.includes(pref)) {
                return { ...prev, preferences: prefs.filter(p => p !== pref) };
              } else {
                return { ...prev, preferences: [...prefs, pref] };
              }
            });
          };

          const handleGenerate = async () => {
            if (!apiKey) {
              setError('由于没有配置 API Key，无法调用 AI，请在代码配置区填入您的 DeepSeek API Key。');
              return;
            }

            const filledFields = Object.values(formData).filter(val => 
              Array.isArray(val) ? val.length > 0 : val.trim() !== ''
            ).length;
            
            if (filledFields < 2) {
              setError('请至少填写/选择两个条件（例如：目的地和偏好），以便AI更好地为您规划。');
              return;
            }

            setError('');
            setLoading(true);
            setItineraryData(null);

            const userQuery = `
              请为我生成一份详细的个性化旅游攻略。已知条件如下：
              - 目的地: ${formData.destination || '未指定'}
              - 旅行天数: ${formData.days || '未指定'}
              - 预算: ${formData.budget || '未指定'}
              - 偏好类型: ${formData.preferences.length > 0 ? formData.preferences.join('、') : '未指定'}
              
              要求：
              1. 每天的行程必须独立提供一个详细的【酒店住宿建议】。
              2. 每天包含2-4个具体游玩/餐饮地点。
              3. 每个地点需要给出详尽的避坑和游玩建议。
            `;

            // ⚠️ 核心升级：强迫AI输出独立的酒店模块
            const systemPrompt = `
              你是一个专业旅游规划师。请严格输出以下JSON，不要Markdown和其他任何解释性文字：
              {
                "destination": "目的地",
                "summary": "一句总结",
                "totalDays": "总天数",
                "days": [
                  {
                    "dayNumber": 1,
                    "theme": "今天的主题",
                    "hotel": {
                      "name": "推荐的酒店/民宿名称（必须具体）",
                      "price": "大概价格区间（如：400元/晚）",
                      "description": "详细的推荐理由，比如位置优势、特色风景等"
                    },
                    "activities": [
                      {
                        "time": "09:00",
                        "name": "地点名称",
                        "type": "attraction/food/shopping/transport",
                        "description": "请提供非常详细的背景介绍、必体验项目（至少80字以上）",
                        "tips": "必填：提供实用的防坑贴士，如：推荐菜品、最佳拍照机位或交通建议"
                      }
                    ]
                  }
                ]
              }
            `;

            try {
              const result = await fetchWithRetry(
                `${apiBaseUrl}/chat/completions`,
                {
                  method: 'POST',
                  headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}` 
                  },
                  body: JSON.stringify({
                    model: "deepseek-chat", 
                    messages: [
                      { role: "system", "content": systemPrompt },
                      { role: "user", "content": userQuery }
                    ],
                    response_format: { type: "json_object" } 
                  })
                }
              );

              const text = result.choices?.[0]?.message?.content;
              if (!text) throw new Error("AI未能返回有效内容");
              
              setItineraryData(JSON.parse(text));
            } catch (err) {
              console.error(err);
              setError('生成发生错误，请检查您的网络连通性或确保 DeepSeek API Key 填写正确。');
            } finally {
              setLoading(false);
            }
          };

          return (
            <div className="min-h-screen bg-[#f8fafc] font-sans text-slate-800">
              <header className="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm border-b border-white/20 transition-all">
                <div className="max-w-7xl mx-auto px-4 md:px-8 py-4 flex items-center justify-between">
                  <div className="flex items-center space-x-2 text-blue-600">
                    <PlaneIcon />
                    <h1 className="text-2xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">智绘旅途</h1>
                  </div>
                </div>
              </header>

              {!itineraryData ? (
                <main className="relative min-h-screen flex items-center justify-center pt-16">
                  <div className="absolute inset-0 z-0">
                    <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?q=80&w=2070&auto=format&fit=crop" className="w-full h-full object-cover"/>
                    <div className="absolute inset-0 bg-gradient-to-b from-slate-900/70 via-slate-900/40 to-slate-900/80"></div>
                  </div>

                  <div className="relative z-10 w-full max-w-5xl mx-auto px-4 text-center mt-[-5vh]">
                    <span className="inline-block py-1 px-3 rounded-full bg-white/20 backdrop-blur-md text-white text-xs font-bold tracking-widest mb-6 border border-white/30">
                      POWERED BY DEEPSEEK
                    </span>
                    <h2 className="text-5xl md:text-7xl font-extrabold text-white mb-6 tracking-tight drop-shadow-lg">生成你的专属旅行</h2>
                    <p className="text-lg text-slate-100 mb-12 font-medium">一键获取包含漫画手绘路线图、酒店住宿推荐的个性化深度游手账。</p>

                    <div className="bg-white/95 backdrop-blur-2xl rounded-[2rem] shadow-2xl p-6 md:p-8 max-w-4xl mx-auto text-left border border-white/40">
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                        <div className="space-y-2">
                          <label className="text-sm font-bold text-slate-700 flex items-center"><MapPinIcon /> 目的地</label>
                          <input type="text" name="destination" value={formData.destination} onChange={handleInputChange} placeholder="大理 / 冰岛" className="w-full px-4 py-3.5 rounded-xl bg-slate-100/50 border outline-none focus:border-blue-500 font-medium"/>
                        </div>
                        <div className="space-y-2">
                          <label className="text-sm font-bold text-slate-700 flex items-center"><CalendarIcon /> 游玩天数</label>
                          <input type="text" name="days" value={formData.days} onChange={handleInputChange} placeholder="例如：5天" className="w-full px-4 py-3.5 rounded-xl bg-slate-100/50 border outline-none focus:border-blue-500 font-medium"/>
                        </div>
                        <div className="space-y-2">
                          <label className="text-sm font-bold text-slate-700 flex items-center"><DollarIcon /> 行程预算</label>
                          <input type="text" name="budget" value={formData.budget} onChange={handleInputChange} placeholder="例如：人均5000" className="w-full px-4 py-3.5 rounded-xl bg-slate-100/50 border outline-none focus:border-blue-500 font-medium"/>
                        </div>
                      </div>

                      <div className="space-y-3 mb-8">
                        <label className="text-sm font-bold text-slate-700 flex items-center"><CompassIcon /> 风格偏好 <span className="text-xs text-slate-400 font-normal ml-2">(可多选)</span></label>
                        <div className="flex flex-wrap gap-2.5">
                          {preferenceOptions.map(pref => (
                            <button key={pref} type="button" onClick={() => togglePreference(pref)} className={`px-4 py-2.5 rounded-xl text-sm font-bold transition-all border ${formData.preferences.includes(pref) ? 'bg-blue-500 text-white border-blue-500 shadow-md' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>
                              {pref}
                            </button>
                          ))}
                        </div>
                      </div>

                      {error && (
                        <div className="mb-5 p-3.5 bg-red-50 text-red-600 rounded-xl flex items-center text-sm font-medium"><AlertIcon /> {error}</div>
                      )}

                      <button onClick={handleGenerate} disabled={loading} className="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold text-lg rounded-xl shadow-xl flex items-center justify-center transition-all hover:scale-[1.01]">
                        {loading ? <><LoaderIcon /> 小智同学正在为您绘制漫画路线图与攻略...</> : '开始智能规划'}
                      </button>
                    </div>
                  </div>
                </main>
              ) : (
                /* --- 沉浸式单列布局 --- */
                <main className="pt-24 pb-16 max-w-4xl mx-auto px-4 md:px-6 flex flex-col">
                  
                  {/* 返回操作栏 */}
                  <div className="bg-white rounded-2xl p-4 mb-6 flex gap-4 shadow-sm border border-slate-200 sticky top-20 z-40">
                    <button onClick={() => setItineraryData(null)} className="px-6 py-2 bg-slate-100 hover:bg-slate-200 font-bold rounded-xl text-sm transition-colors text-slate-700">← 返回修改偏好</button>
                  </div>
                  
                  {/* 头部大图与标题 */}
                  <div className="bg-gradient-to-br from-blue-600 to-purple-700 rounded-[2rem] p-8 md:p-12 text-white mb-8 shadow-xl relative overflow-hidden group">
                    <img src={`https://picsum.photos/seed/${encodeURIComponent(itineraryData.destination + '全景')}/1200/600`} className="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:opacity-50 transition-opacity duration-700" alt="封面" />
                    <div className="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
                    <div className="relative z-10">
                      <span className="inline-block py-1 px-3 rounded-full bg-white/20 backdrop-blur-md text-white text-xs font-bold tracking-widest mb-4 border border-white/30">专属制定</span>
                      <h2 className="text-5xl md:text-6xl font-black mb-4 drop-shadow-lg">{itineraryData.destination}</h2>
                      <p className="bg-black/30 backdrop-blur-md p-5 rounded-2xl text-base md:text-lg leading-relaxed font-medium border border-white/10 inline-block max-w-2xl shadow-lg">
                        {itineraryData.summary}
                      </p>
                    </div>
                  </div>

                  {/* 静态大富翁风路线图 (防重叠) */}
                  <ComicRouteMap itinerary={itineraryData} />

                  {/* 每日详细图文手账 */}
                  <div className="space-y-10">
                    {itineraryData.days.map((day, idx) => (
                      <div key={idx} className="bg-white rounded-[2rem] shadow-md border border-slate-200 p-6 md:p-8">
                        <h3 className="text-2xl font-black mb-6 flex items-center text-slate-800 border-b border-slate-100 pb-4">
                          <span className="bg-gradient-to-br from-blue-500 to-indigo-600 text-white px-4 py-1.5 rounded-full text-base mr-3 shadow-md">第 {day.dayNumber} 天</span> 
                          {day.theme}
                        </h3>

                        {/* 🌟 核心升级：专属独立酒店模块 */}
                        {day.hotel && (
                          <div className="mb-8 bg-blue-50 border-l-4 border-blue-500 rounded-r-2xl p-5 shadow-sm relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-10 text-6xl">🏨</div>
                            <h4 className="text-lg font-black text-blue-900 mb-2 flex items-center">
                              <span className="mr-2">🏨</span> 专属住宿推荐：{day.hotel.name}
                            </h4>
                            <div className="text-blue-700 font-bold mb-3 bg-white inline-block px-3 py-1 rounded-lg shadow-sm text-sm">
                              预计花费：{day.hotel.price}
                            </div>
                            <p className="text-slate-600 text-sm leading-relaxed mb-4 font-medium relative z-10">
                              {day.hotel.description}
                            </p>
                            <a href={`https://m.ctrip.com/html5/hotel/hotelsearch?keyword=${day.hotel.name}`} target="_blank" className="inline-flex items-center text-sm font-bold text-white bg-blue-600 px-5 py-2 rounded-xl shadow-md hover:bg-blue-700 transition-all relative z-10">
                              前往携程查看房型及预订 ↗
                            </a>
                          </div>
                        )}
                        
                        {/* 游玩环节 */}
                        <div className="space-y-10 relative">
                          {day.activities.map((act, i) => (
                            <div key={i} className="relative">
                              <div className="flex items-center mb-4">
                                <div className="font-black text-lg text-blue-600 bg-blue-50 px-3 py-1 rounded-lg border border-blue-100">{act.time}</div>
                                <div className="ml-4 font-black text-2xl text-slate-800">{act.name}</div>
                              </div>
                              
                              <div className="grid grid-cols-1 md:grid-cols-5 gap-6">
                                <div className="md:col-span-3 space-y-4">
                                  <div className="text-base text-slate-600 leading-loose font-medium text-justify">
                                    {act.description}
                                  </div>
                                  
                                  {act.tips && (
                                    <div className="text-sm text-amber-800 bg-amber-50 p-4 rounded-2xl border border-amber-200 flex items-start shadow-inner">
                                      <span className="mr-2 text-xl leading-none">💡</span> 
                                      <span className="leading-relaxed font-bold">{act.tips}</span>
                                    </div>
                                  )}

                                  <div className="flex flex-wrap gap-3 pt-2">
                                    <a href={`https://search.bilibili.com/all?keyword=${act.name} Vlog 旅游`} target="_blank" className="inline-flex items-center text-sm font-bold text-pink-600 bg-pink-50 px-4 py-2 rounded-xl border border-pink-200 hover:bg-pink-500 hover:text-white transition-all shadow-sm">
                                      ▶️ 查 B站 Vlog
                                    </a>
                                    {act.type === 'food' && (
                                      <a href={`https://www.dianping.com/search/keyword/0/0_${act.name}`} target="_blank" className="inline-flex items-center text-sm font-bold text-orange-600 bg-orange-50 px-4 py-2 rounded-xl border border-orange-200 hover:bg-orange-500 hover:text-white transition-all shadow-sm">
                                        🍔 大众点评
                                      </a>
                                    )}
                                    {(act.type === 'attraction' || act.type === 'transport' || act.type === 'shopping') && (
                                      <a href={`https://ditu.amap.com/search?query=${act.name}`} target="_blank" className="inline-flex items-center text-sm font-bold text-emerald-600 bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-200 hover:bg-emerald-500 hover:text-white transition-all shadow-sm">
                                        🗺️ 高德导航
                                      </a>
                                    )}
                                  </div>
                                </div>

                                {/* 动态配图区 */}
                                <div className="md:col-span-2">
                                  <div className="rounded-2xl overflow-hidden shadow-md border-4 border-white transform transition duration-500 hover:scale-105 hover:rotate-1 relative group aspect-[4/3] bg-slate-100">
                                    <img 
                                      src={`https://picsum.photos/seed/${encodeURIComponent(act.name + '风景')}/600/400`} 
                                      alt={act.name} 
                                      className="w-full h-full object-cover"
                                      loading="lazy"
                                    />
                                    <div className="absolute bottom-3 right-3 bg-black/50 backdrop-blur-md text-white text-xs font-bold px-2 py-1 rounded-lg">实景参考</div>
                                  </div>
                                </div>
                              </div>
                              
                              {i !== day.activities.length - 1 && (
                                <div className="w-full border-t-2 border-dashed border-slate-200 my-8"></div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </main>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
